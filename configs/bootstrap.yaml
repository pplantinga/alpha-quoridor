# Quoridor Bootstrap Configuration

# Phase 1: Minimax Priming
minimax_priming_games: 100
minimax_depth: 3
minimax_noise: 1.0

# Phase 2: Wall Curriculum
# Format: [ [start_epoch, walls_per_player], ... ]
wall_curriculum:
  - [1, 3]    # Epoch 1-4: 3 wall
  - [5, 4]    # Epoch 5-9: 4 walls
  - [10, 5]   # Epoch 10-19: 5 walls
  - [20, 7]   # Epoch 20-39: 7 walls
  - [40, 10]  # Epoch 40+: Full walls

epochs: 100

reward:
  progress_weight: 0.3
  block_weight: 0.2
  draw_penalty: -0.05
  draw_heuristic_w: 0.4
