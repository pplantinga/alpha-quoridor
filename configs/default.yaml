board_size: 9
walls_per_player: 10

model:
  hidden_dim: 256
  num_blocks: 8
  use_compile: true

training:
  num_self_play_games: 400
  batch_size: 256
  lr: 0.001
  num_iterations: 100
  buffer_size: 50000
  num_workers: 12

mcts:
  num_simulations: 800
  c_puct: 1.5
  temperature: 1.0
  dirichlet_noise_alpha: 0.3
  dirichlet_noise_epsilon: 0.25

reward:
  progress_weight: 0.3    # reward for reducing own path length per step
  block_weight: 0.2       # reward for increasing opponent path length per step
  draw_penalty: -0.05     # base value for draw/timeout positions (discourages oscillation)
  draw_heuristic_w: 0.4   # heuristic multiplier for draw positions
